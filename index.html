    <meta charset="UTF-8">

    <title>Treino de Vocabulário Interativo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* --- TELA DE MENU --- */
        #menu-container {
            width: 90%;
            max-width: 600px;
            height: 90vh;
            margin-top: 5vh;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        #menu-container h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }

        #block-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 10px;
        }

        .btn-bloco {
            padding: 15px;
            font-size: 1.1rem;
            background-color: #f8f9fa;
            color: #333;
            border: 2px solid #dee2e6;
            cursor: pointer;
            text-align: left;
            font-weight: bold;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .btn-bloco:hover {
            background-color: #e9ecef;
            border-color: #ced4da;
        }

        /* --- TELA DE TREINO --- */
        #treino-area {
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            height: 310px;
            background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid #ccc;
            transition: background-color 0.3s, border-color 0.3s;
        }

        #word-card {
            font-size: 2.0rem;
            font-weight: bold;
            color: #333;
            position: absolute;
            white-space: nowrap;
            will-change: transform;
        }

        /* Novo estilo para a dica de repescagem */
        #dica-repescagem {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #6c757d;
            display: none; /* Escondido por padrão */
        }

        #controls {
            margin-top: 20px;
            text-align: center;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin: 0 5px;
            border-radius: 0; /* Botões retangulares */
        }

        #btn-start { background-color: #007bff; }
        #btn-start:hover { background-color: #0056b3; }
        
        #btn-stop { background-color: #dc3545; }
        #btn-stop:hover { background-color: #bd2130; }
        
        #status {
            margin-top: 15px;
            font-size: 1.1rem;
            color: #555;
            font-weight: 500;
            max-width: 80%;
            text-align: center;
        }

        .feedback-verde { background-color: #d4edda !important; border-color: #28a745 !important; }
        .feedback-laranja { background-color: #fff3cd !important; border-color: #ffc107 !important; }
        .feedback-vermelho { background-color: #f8d7da !important; border-color: #dc3545 !important; }
    </style>
</head>

        function limparTextoParaComparacao(texto) {
            return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^\w\s]/gi, '').toLowerCase().trim();
        }

        function obterDistanciaLevenshtein(a, b) {
            const matriz = [];
            for (let i = 0; i <= b.length; i++) matriz[i] = [i];
            for (let j = 0; j <= a.length; j++) matriz[0][j] = j;

            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matriz[i][j] = matriz[i - 1][j - 1];
                    } else {
                        matriz[i][j] = Math.min(
                            matriz[i - 1][j - 1] + 1, 
                            matriz[i][j - 1] + 1,     
                            matriz[i - 1][j] + 1      
                        );
                    }
                }
            }
            return matriz[b.length][a.length];
        }

        function verificarAproximidade(palavraFalada, alternativasCorretas) {
            const faladaLimpa = limparTextoParaComparacao(palavraFalada);
            
            for (let correta of alternativasCorretas) {
                const corretaLimpa = limparTextoParaComparacao(correta);
                const distancia = obterDistanciaLevenshtein(faladaLimpa, corretaLimpa);
                const toleranciaMaxima = corretaLimpa.length <= 4 ? 1 : 2; 
                if (distancia <= toleranciaMaxima) return true;
            }
            return false;
        }

        function prepararBloco(inicio, fim) {
            palavrasDoBlocoAtual = bancoPalavrasCompleto.slice(inicio, fim);
            
            menuContainer.style.display = 'none';
            treinoArea.style.display = 'flex';
            
            document.getElementById('btn-start').style.display = 'inline-block';
            document.getElementById('btn-stop').style.display = 'none';
            container.style.justifyContent = 'center';
            card.innerText = "Clique em Iniciar";
            card.style.transform = 'none';
            dicaRepescagem.style.display = 'none'; // Garante que começa escondida
            atualizarStatus(`Bloco selecionado. Clique em Iniciar.`);
        }

        function iniciarJogo() {
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'inline-block';
            container.style.justifyContent = 'flex-start'; 
            emRepescagem = false;
            listaRepescagem = [];
            indicePalavraAtual = 0;
            
            proximaPalavra();
        }

        function pararJogo(mensagem = "Treino finalizado.") {
            cancelAnimationFrame(idAnimacao);
            DesativarMicrofone();
            
            palavraAtual = null;
            limparFeedbackVisual();
            dicaRepescagem.style.display = 'none';
            
            treinoArea.style.display = 'none';
            menuContainer.style.display = 'flex';
        }

        function proximaPalavra() {
            limparFeedbackVisual();
            cancelAnimationFrame(idAnimacao);

            let listaAlvo = emRepescagem ? listaRepescagem : palavrasDoBlocoAtual;

            if (indicePalavraAtual >= listaAlvo.length) {
                DesativarMicrofone();
                dicaRepescagem.style.display = 'none'; // Esconde a dica na transição

                if (!emRepescagem && listaRepescagem.length > 0) {
                    emRepescagem = true;
                    indicePalavraAtual = 0;
                    atualizarStatus("Fim do bloco! Iniciando repescagem das laranjas...");
                    setTimeout(proximaPalavra, 2500);
                } else {
                    atualizarStatus(`Bloco concluído com sucesso!`);
                    setTimeout(() => pararJogo("Bloco concluído!"), 2000); 
                }
                return;
            }

            palavraAtual = listaAlvo[indicePalavraAtual];
            card.innerText = palavraAtual.pt;
            
            // Lógica para mostrar ou esconder a dica dependendo do modo
            if (emRepescagem) {
                dicaRepescagem.innerText = palavraAtual.es.join(" / ");
                dicaRepescagem.style.display = 'block';
            } else {
                dicaRepescagem.style.display = 'none';
            }
            
            posicaoX = container.clientWidth;
            card.style.transform = `translateX(${posicaoX}px)`;

            atualizarStatus(emRepescagem ? "Repescagem! Fale em espanhol:" : "Fale em espanhol:");
            
            DesativarMicrofone();
            setTimeout(AtivarMicrofone, 200);
            
            animarEsteira();
        }

        function animarEsteira() {
            posicaoX -= velocidade;
            card.style.transform = `translateX(${posicaoX}px)`;

            if (posicaoX + card.offsetWidth < 0) {
                processarErro();
            } else {
                idAnimacao = requestAnimationFrame(animarEsteira);
            }
        }

        function verificarResposta(falado) {
            if (!palavraAtual) return;
            
            if (verificarAproximidade(falado, palavraAtual.es)) {
                processarAcerto();
            } else {
                processarErro();
            }
        }

        function processarAcerto() {
            cancelAnimationFrame(idAnimacao);
            DesativarMicrofone(); 
            container.className = "feedback-verde";
            indicePalavraAtual++;
            palavraAtual = null; 
            setTimeout(proximaPalavra, 1200); 
        }

        function processarErro() {
            cancelAnimationFrame(idAnimacao);
            DesativarMicrofone(); 
            
            if (!emRepescagem) {
                container.className = "feedback-laranja";
                if (!listaRepescagem.includes(palavraAtual)) {
                    listaRepescagem.push(palavraAtual);
                }
            } else {
                container.className = "feedback-vermelho";
            }

            indicePalavraAtual++;
            palavraAtual = null;
            setTimeout(proximaPalavra, 1200);
        }

        function limparFeedbackVisual() {
            container.className = "";
        }

        function atualizarStatus(texto) {
            document.getElementById('status').innerText = texto;
        }

        window.onload = renderizarMenu;

    </script>
</body>
</html>
